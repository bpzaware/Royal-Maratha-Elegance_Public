<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Royal Union of Sanket & Bhagyashree | 26 Nov 2026</title>
<meta name="description" content="Join us in celebrating the royal Maharashtrian wedding of Sanket More & Bhagyashree Zaware on 26 November 2026 at River Paradise Resort, Karjat." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#08070b;
  --bg-soft:#0f0d14;
  --bg-card:#15121d;
  --gold:#d4af37;
  --gold-soft:#e8c870;
  --gold-deep:#a8821f;
  --maroon:#4a0d1f;
  --maroon-deep:#2a0712;
  --ivory:#f4ecd8;
  --muted:#9a8f7a;
  --line:rgba(212,175,55,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ivory);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(74,13,31,.35), transparent 70%),
    radial-gradient(ellipse 60% 40% at 100% 100%, rgba(212,175,55,.08), transparent 70%),
    radial-gradient(ellipse 60% 40% at 0% 60%, rgba(74,13,31,.18), transparent 70%),
    var(--bg);
  min-height:100vh;
  overflow-x:hidden;
}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
input,select,textarea{font-family:inherit}

/* Typography */
.font-display{font-family:'Cinzel',serif;letter-spacing:.04em}
.font-serif{font-family:'Playfair Display',serif}
.font-sans{font-family:'Inter',sans-serif}
.text-gold{color:var(--gold)}
.text-gold-soft{color:var(--gold-soft)}
.text-muted{color:var(--muted)}
.text-ivory{color:var(--ivory)}
.gold-gradient{
  background:linear-gradient(135deg,#f5e7a3 0%,#d4af37 35%,#a8821f 60%,#e8c870 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.eyebrow{font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:.4em;text-transform:uppercase;color:var(--gold)}

/* Glass card */
.glass{
  background:linear-gradient(180deg,rgba(30,24,40,.7),rgba(15,12,20,.55));
  backdrop-filter:blur(14px) saturate(120%);
  -webkit-backdrop-filter:blur(14px) saturate(120%);
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:0 18px 60px -28px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.04);
}
.glass-lg{border-radius:24px}
.gold-border{border:1px solid rgba(212,175,55,.35)}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.55rem;
  padding:.85rem 1.7rem;border-radius:999px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-size:.78rem;
  transition:transform .25s ease,box-shadow .25s ease,background .25s ease,color .25s ease;
  white-space:nowrap;
}
.btn-gold{
  background:linear-gradient(135deg,#e8c870,#d4af37 50%,#a8821f);
  color:#1a0f05;
  box-shadow:0 10px 30px -10px rgba(212,175,55,.55), inset 0 1px 0 rgba(255,255,255,.4);
}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 14px 40px -10px rgba(212,175,55,.7)}
.btn-outline{background:transparent;color:var(--gold);border:1px solid rgba(212,175,55,.55)}
.btn-outline:hover{background:rgba(212,175,55,.08);transform:translateY(-2px)}
.btn-ghost{background:rgba(255,255,255,.04);color:var(--ivory);border:1px solid rgba(255,255,255,.08)}
.btn-ghost:hover{background:rgba(255,255,255,.08)}

/* Layout */
.container{max-width:1200px;margin:0 auto;padding:0 1.5rem}
.section{padding:6rem 0;position:relative}
.divider-orn{display:flex;align-items:center;justify-content:center;gap:1rem;color:var(--gold);margin:1rem 0 2rem}
.divider-orn .line{height:1px;width:64px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}

/* Navbar */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:60;
  background:rgba(8,7,11,.75);backdrop-filter:blur(16px) saturate(140%);
  border-bottom:1px solid var(--line);
}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:72px}
.brand{display:flex;align-items:center;gap:.6rem;font-family:'Cinzel',serif;letter-spacing:.18em;font-weight:700;color:var(--gold);font-size:1.05rem}
.brand .amp{color:var(--ivory);opacity:.7}
.nav-links{display:flex;gap:2rem;align-items:center}
.nav-link{position:relative;font-size:.85rem;letter-spacing:.08em;color:var(--ivory);opacity:.8;transition:color .2s ease,opacity .2s ease}
.nav-link:hover{color:var(--gold);opacity:1}
.nav-link.active{color:var(--gold);opacity:1}
.nav-link.active::after{content:"";position:absolute;left:50%;transform:translateX(-50%);bottom:-22px;width:24px;height:2px;background:var(--gold);border-radius:2px}
.nav-toggle{display:none;color:var(--gold)}
@media (max-width: 880px){
  .nav-links{display:none}
  .nav-toggle{display:inline-flex}
  .mobile-menu.open{display:flex}
  .mobile-menu{
    display:none;flex-direction:column;gap:.25rem;position:fixed;top:72px;right:0;width:84%;max-width:340px;height:calc(100vh - 72px);
    background:rgba(15,12,20,.96);backdrop-filter:blur(20px);border-left:1px solid var(--line);padding:2rem 1.5rem;z-index:55;
  }
  .mobile-menu a{padding:1rem 0;border-bottom:1px solid var(--line);font-family:'Cinzel',serif;letter-spacing:.16em;color:var(--ivory)}
  .mobile-menu a.active{color:var(--gold)}
}

/* Hero */
.hero{position:relative;min-height:100vh;padding-top:9rem;padding-bottom:5rem;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden}
.hero-mandala{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(78vmin,820px);height:min(78vmin,820px);opacity:.16;pointer-events:none;animation:spin 90s linear infinite}
@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
.hero-mandala-2{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(58vmin,640px);height:min(58vmin,640px);opacity:.12;pointer-events:none;animation:spin 120s linear infinite reverse}
.couple-card{
  position:relative;width:280px;height:200px;margin:0 auto 2rem;border-radius:14px;overflow:hidden;
  background:radial-gradient(ellipse at center,rgba(212,175,55,.25),rgba(74,13,31,.4) 60%,#15121d 100%);
  border:1px solid rgba(212,175,55,.45);
  box-shadow:0 30px 80px -20px rgba(212,175,55,.3),inset 0 0 60px rgba(74,13,31,.4);
}
.hero h1{font-family:'Cinzel',serif;font-weight:700;font-size:clamp(2.4rem,7vw,5.2rem);line-height:1.05;margin:1rem 0;letter-spacing:.02em}
.hero h1 .amp{font-family:'Playfair Display',serif;font-style:italic;color:var(--ivory);opacity:.65;font-weight:400;margin:0 .4rem}
.hero-meta{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:1.25rem;color:var(--ivory);opacity:.85;font-size:1.05rem;margin-top:1rem}
.hero-meta .sep{width:1px;height:18px;background:var(--gold);opacity:.4}
.hero-cta{display:flex;flex-wrap:wrap;gap:1rem;justify-content:center;margin-top:2.5rem}

/* Countdown */
.countdown{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1rem;max-width:680px;margin:3.5rem auto 0}
.cd-cell{padding:1.4rem 1rem;text-align:center}
.cd-num{font-family:'Cinzel',serif;font-weight:700;font-size:clamp(1.7rem,4.4vw,2.6rem);color:var(--gold);line-height:1}
.cd-label{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);margin-top:.55rem}

/* Section heading */
.section-heading{text-align:center;margin-bottom:3.5rem}
.section-heading h2{font-family:'Cinzel',serif;font-size:clamp(1.9rem,4.5vw,3rem);font-weight:700;margin:.6rem 0;letter-spacing:.02em}
.section-heading p{color:var(--muted);max-width:640px;margin:.5rem auto 0;font-size:1.02rem}

/* Particles */
#particles{position:fixed;inset:0;pointer-events:none;z-index:1}
.page-wrap{position:relative;z-index:2}

/* Quick links grid */
.qlinks{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.25rem;max-width:1000px;margin:4.5rem auto 0}
.qlink{padding:1.5rem;text-align:center;transition:transform .3s ease,border-color .3s ease}
.qlink:hover{transform:translateY(-4px);border-color:rgba(212,175,55,.55)}
.qlink .ic{width:42px;height:42px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(212,175,55,.1);color:var(--gold);margin-bottom:.85rem}
.qlink h3{font-family:'Cinzel',serif;font-size:.95rem;letter-spacing:.16em;color:var(--gold);text-transform:uppercase}
.qlink p{color:var(--muted);font-size:.85rem;margin-top:.4rem}

/* Forms */
.field{display:block;margin-bottom:1.25rem;position:relative}
.field label{display:block;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:.5rem}
.input,.select,.textarea{
  width:100%;padding:.85rem 1rem;border-radius:10px;
  background:rgba(15,12,20,.7);
  border:1px solid var(--line);color:var(--ivory);font-size:.95rem;transition:border-color .2s ease,background .2s ease;
}
.input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--gold);background:rgba(15,12,20,.95)}
.textarea{min-height:96px;resize:vertical}
.suggest{position:absolute;top:100%;left:0;right:0;background:rgba(15,12,20,.98);border:1px solid var(--line);border-radius:10px;margin-top:.4rem;max-height:240px;overflow:auto;z-index:30}
.suggest div{padding:.7rem 1rem;cursor:pointer;border-bottom:1px solid rgba(212,175,55,.06);font-size:.92rem}
.suggest div:hover{background:rgba(212,175,55,.08);color:var(--gold)}
.radios{display:flex;gap:.75rem;flex-wrap:wrap}
.radio{flex:1;min-width:120px;padding:1rem;border-radius:12px;border:1px solid var(--line);text-align:center;cursor:pointer;transition:all .2s ease;background:rgba(15,12,20,.5)}
.radio:hover{border-color:rgba(212,175,55,.45)}
.radio.active{border-color:var(--gold);background:rgba(212,175,55,.08);color:var(--gold)}

/* Rituals timeline */
.ritual-list{display:grid;gap:1.25rem;max-width:880px;margin:0 auto}
.ritual-card{display:grid;grid-template-columns:80px 1fr;gap:1.5rem;padding:1.75rem;align-items:flex-start;transition:transform .3s ease,border-color .3s ease}
.ritual-card:hover{transform:translateX(6px);border-color:rgba(212,175,55,.45)}
.ritual-icon{width:64px;height:64px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:linear-gradient(135deg,rgba(212,175,55,.18),rgba(74,13,31,.5));border:1px solid rgba(212,175,55,.4);color:var(--gold)}
.ritual-card h3{font-family:'Cinzel',serif;font-size:1.25rem;color:var(--gold);margin-bottom:.25rem}
.ritual-card .time{font-size:.78rem;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:.6rem;font-family:'Cinzel',serif}
.ritual-card p{color:var(--ivory);opacity:.85;line-height:1.6;font-size:.95rem}

/* Venue */
.venue-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:2rem;align-items:start}
@media (max-width:880px){.venue-grid{grid-template-columns:1fr}}
.venue-img{
  height:380px;border-radius:18px;border:1px solid rgba(212,175,55,.3);overflow:hidden;position:relative;
  background:linear-gradient(135deg,#1a0f1f 0%,#2a0712 50%,#15121d 100%);
}
.venue-img::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 80%,rgba(212,175,55,.18),transparent 60%)}
.venue-cards{display:grid;gap:1.25rem}
.travel-card{padding:1.5rem;display:flex;gap:1rem;align-items:flex-start}
.travel-card .ic{width:44px;height:44px;border-radius:50%;background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);display:flex;align-items:center;justify-content:center;color:var(--gold);flex-shrink:0}
.travel-card h4{font-family:'Cinzel',serif;color:var(--gold);font-size:1rem;letter-spacing:.1em;margin-bottom:.4rem}
.travel-card p{color:var(--ivory);opacity:.85;font-size:.9rem;line-height:1.55}
.map-iframe{width:100%;height:380px;border:0;border-radius:18px;filter:invert(.92) hue-rotate(180deg) saturate(.6) brightness(.95);}

/* India page */
.video-wrap{position:relative;aspect-ratio:16/9;border-radius:18px;overflow:hidden;border:1px solid rgba(212,175,55,.35);box-shadow:0 30px 80px -20px rgba(0,0,0,.8)}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.dest-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.25rem;margin-top:3rem}
.dest-card{overflow:hidden;cursor:pointer;transition:transform .3s ease,border-color .3s ease;display:flex;flex-direction:column}
.dest-card:hover{transform:translateY(-6px);border-color:rgba(212,175,55,.5)}
.dest-img{height:170px;position:relative;overflow:hidden}
.dest-img .gradient{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(8,7,11,.85) 100%)}
.dest-card .body{padding:1.25rem 1.4rem 1.5rem}
.dest-card h4{font-family:'Cinzel',serif;color:var(--gold);font-size:1.05rem;letter-spacing:.08em;margin-bottom:.3rem}
.dest-card .region{font-size:.7rem;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;margin-bottom:.7rem;font-family:'Cinzel',serif}
.dest-card p{color:var(--ivory);opacity:.85;font-size:.88rem;line-height:1.55;margin-bottom:.85rem}
.dest-card button{font-size:.72rem;letter-spacing:.14em;color:var(--gold);text-transform:uppercase;display:inline-flex;align-items:center;gap:.4rem;font-family:'Cinzel',serif;font-weight:600}

/* Itinerary */
.itin-wrap{margin-top:4rem}
.itin-list{display:grid;gap:.8rem;margin-top:1.25rem}
.itin-item{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-radius:12px;background:rgba(15,12,20,.7);border:1px solid var(--line)}
.itin-item .left{display:flex;align-items:center;gap:.85rem}
.itin-item .num{width:28px;height:28px;border-radius:50%;background:rgba(212,175,55,.15);color:var(--gold);font-family:'Cinzel',serif;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700}
.itin-item .rm{color:var(--muted);transition:color .2s}
.itin-item .rm:hover{color:#e63946}

/* FAQs */
.faq-list{max-width:820px;margin:0 auto;display:grid;gap:.85rem}
.faq{padding:1.25rem 1.5rem;cursor:pointer;transition:border-color .2s}
.faq:hover{border-color:rgba(212,175,55,.4)}
.faq-q{display:flex;align-items:center;justify-content:space-between;gap:1rem;font-family:'Cinzel',serif;color:var(--ivory);font-size:1.02rem;letter-spacing:.04em}
.faq-q .chev{color:var(--gold);transition:transform .3s}
.faq.open .chev{transform:rotate(180deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .35s ease;color:var(--muted);font-size:.95rem;line-height:1.65}
.faq.open .faq-a{max-height:400px;margin-top:.85rem}

/* Footer */
.footer{padding:4rem 0 2.5rem;border-top:1px solid var(--line);text-align:center;background:linear-gradient(180deg,transparent,rgba(74,13,31,.18))}
.footer .names{font-family:'Cinzel',serif;font-size:1.4rem;letter-spacing:.18em}
.footer .meta{color:var(--muted);margin-top:.6rem;font-size:.9rem}
.footer .credit{margin-top:2rem;font-size:.75rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}

/* Music toggle */
.music-toggle{position:fixed;bottom:1.5rem;right:1.5rem;z-index:40;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#1a0f05,#3d2510);border:1px solid var(--gold);color:var(--gold);display:flex;align-items:center;justify-content:center;box-shadow:0 12px 30px -8px rgba(0,0,0,.7)}
.music-toggle:hover{transform:scale(1.07)}

/* Page transitions */
.page{animation:fade .55s ease both}
@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Toast */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#1a0f05,#3d2510);border:1px solid var(--gold);color:var(--gold);padding:1rem 2rem;border-radius:999px;z-index:80;font-family:'Cinzel',serif;letter-spacing:.12em;font-size:.85rem;box-shadow:0 20px 60px -20px rgba(0,0,0,.8);animation:toast-in .35s ease both}
@keyframes toast-in{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}

/* Utility */
.center{text-align:center}
.mt-1{margin-top:.5rem}.mt-2{margin-top:1rem}.mt-3{margin-top:1.5rem}.mt-4{margin-top:2rem}.mt-6{margin-top:3rem}
.mb-1{margin-bottom:.5rem}.mb-2{margin-bottom:1rem}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:.5rem}.gap-3{gap:.75rem}
.grid{display:grid}.gap-4{gap:1rem}
.tag{display:inline-block;padding:.3rem .8rem;border-radius:999px;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;font-family:'Cinzel',serif;background:rgba(212,175,55,.1);color:var(--gold);border:1px solid rgba(212,175,55,.3);margin-right:.4rem;margin-bottom:.4rem}
.subtle-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(74,13,31,.2),transparent 70%);pointer-events:none}

/* Scrollbar */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:#0f0d14}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--gold-deep),#3d2510);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}
</style>
</head>

<!-- ============================================================
     INLINE SVG ASSETS (mandala, ornaments, couple silhouette)
     ============================================================ -->
<svg id="svgDefs" style="display:none">
  <defs>
    <symbol id="mandala" viewBox="0 0 400 400">
      <g fill="none" stroke="currentColor" stroke-width="0.6">
        <circle cx="200" cy="200" r="190"/>
        <circle cx="200" cy="200" r="160"/>
        <circle cx="200" cy="200" r="120"/>
        <circle cx="200" cy="200" r="80"/>

function diffParts(target){
  const ms = Math.max(0, target - new Date());
  const days = Math.floor(ms/86400000);
  const hours = Math.floor((ms%86400000)/3600000);
  const mins = Math.floor((ms%3600000)/60000);
  const secs = Math.floor((ms%60000)/1000);
  return {days,hours,mins,secs};
}

/* ============================================================
   PARTICLES
   ============================================================ */
(function particles(){
  const c = document.getElementById("particles");
  const ctx = c.getContext("2d");
  let w, h, parts=[];
  function resize(){
    w = c.width = window.innerWidth * devicePixelRatio;
    h = c.height = window.innerHeight * devicePixelRatio;
    c.style.width = window.innerWidth+"px";
    c.style.height = window.innerHeight+"px";
  }
  function init(){
    parts = [];
    const count = Math.min(80, Math.floor((window.innerWidth*window.innerHeight)/22000));
    for(let i=0;i<count;i++){
      parts.push({
        x: Math.random()*w, y: Math.random()*h,
        r: (Math.random()*1.5+0.4)*devicePixelRatio,
        vx: (Math.random()-0.5)*0.18*devicePixelRatio,
        vy: (-Math.random()*0.3-0.05)*devicePixelRatio,
        a: Math.random()*0.6+0.3,
        tw: Math.random()*Math.PI*2
      });
    }
  }
  function tick(){
    ctx.clearRect(0,0,w,h);
    for(const p of parts){
      p.x+=p.vx; p.y+=p.vy; p.tw+=0.02;
      if(p.y < -10) {p.y = h+10; p.x = Math.random()*w;}
      if(p.x < -10) p.x = w+10;
      if(p.x > w+10) p.x = -10;
      const a = p.a * (0.6 + 0.4*Math.sin(p.tw));
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(212,175,55,${a})`;
      ctx.shadowBlur = 8*devicePixelRatio;
      ctx.shadowColor = "rgba(212,175,55,.7)";
      ctx.fill();
    }
    requestAnimationFrame(tick);
  }
  resize(); init(); tick();
  window.addEventListener("resize",()=>{resize(); init();});
})();

/* ============================================================
   AMBIENT MUSIC (Web Audio drone, no external file needed)
   ============================================================ */
let audioCtx, gainNode, oscs=[], musicOn=false;
function toggleMusic(){
  const btn = document.getElementById("musicToggle");
  if(!musicOn){
    try{
      audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
      gainNode = audioCtx.createGain(); gainNode.gain.value = 0; gainNode.connect(audioCtx.destination);
      // soft tanpura-like drone
      [110, 165, 220, 330].forEach((f,i)=>{
        const o = audioCtx.createOscillator();
        o.type = i===0 ? "sine" : (i===1?"triangle":"sine");
        o.frequency.value = f;
        const g = audioCtx.createGain(); g.gain.value = i===0?0.07:0.025;
        const lfo = audioCtx.createOscillator(); lfo.frequency.value = 0.08+i*0.05;
        const lfoG = audioCtx.createGain(); lfoG.gain.value = 0.01;
        lfo.connect(lfoG); lfoG.connect(g.gain); lfo.start();
        o.connect(g); g.connect(gainNode); o.start();
        oscs.push({o,g,lfo});
      });
      gainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime+1.2);
      musicOn = true;
      btn.innerHTML = ICONS.unmute;
    }catch(e){}
  }else{
    if(gainNode){
      gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.6);
      setTimeout(()=>{
        oscs.forEach(({o,lfo})=>{try{o.stop();lfo.stop();}catch{}});
        oscs=[];
      },800);
    }
    musicOn = false;
    btn.innerHTML = ICONS.mute;
  }
}
document.getElementById("musicToggle").innerHTML = ICONS.mute;
document.getElementById("musicToggle").addEventListener("click", toggleMusic);

const PAGE_RENDERERS = {home:pageHome, rsvp:pageRSVP, rituals:pageRituals, venue:pageVenue, india:pageIndia, faqs:pageFAQs};
const PAGE_TITLES = {
  home:"The Royal Union of Sanket & Bhagyashree | 26 Nov 2026",
  rsvp:"RSVP | Sanket & Bhagyashree",
  rituals:"Rituals & Traditions | Sanket & Bhagyashree",
  venue:"Venue & Travel | Sanket & Bhagyashree",
  india:"Incredible India | Sanket & Bhagyashree",
  faqs:"FAQs | Sanket & Bhagyashree"
};

/* ============================================================
   RENDER & WIRE-UP
   ============================================================ */
let countdownTimer = null;
function render(){
  document.getElementById("app").innerHTML = PAGE_RENDERERS[currentPage]();
  document.title = PAGE_TITLES[currentPage];
  document.querySelectorAll(".nav-link").forEach(a=>{
    a.classList.toggle("active", a.getAttribute("data-page")===currentPage);
  });
  wireGlobalLinks();
  if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null}
  if(currentPage==="home") wireHome();
  if(currentPage==="rsvp") wireRSVP();
  if(currentPage==="india") wireIndia();
  if(currentPage==="faqs") wireFAQs();
}

function wireGlobalLinks(){
  document.querySelectorAll("[data-page]").forEach(el=>{
    el.addEventListener("click",e=>{
      e.preventDefault();
      navigate(el.getAttribute("data-page"));
    });
  });
}

function wireHome(){
  const update = ()=>{
    const {days,hours,mins,secs} = diffParts(WEDDING_DATE);
    const m = {days,hours,mins,secs};
    document.querySelectorAll("[data-cd]").forEach(n=>{
      const k = n.getAttribute("data-cd");
      n.textContent = String(m[k]).padStart(k==="days"?0:2,"0");
    });
  };
  update();
  countdownTimer = setInterval(update,1000);
}

function wireRSVP(){
  const nameInput = document.getElementById("rsvpName");
  const sug = document.getElementById("rsvpSuggest");
  const attendBox = document.getElementById("rsvpAttend");
  let attend = "yes";
  attendBox.querySelector('[data-val="yes"]').classList.add("active");
  attendBox.querySelectorAll(".radio").forEach(r=>{
    r.addEventListener("click",()=>{
      attendBox.querySelectorAll(".radio").forEach(x=>x.classList.remove("active"));
      r.classList.add("active");
      attend = r.getAttribute("data-val");
      document.getElementById("extraFields").style.display = attend==="yes"?"block":"none";
      document.getElementById("eventChecks").parentElement.style.display = attend==="yes"?"block":"none";
    });
  });

  nameInput.addEventListener("input",()=>{
    const v = nameInput.value.trim().toLowerCase();
    if(v.length<2){sug.style.display="none";return}
    const matches = GUESTS.filter(g=>g.toLowerCase().includes(v)).slice(0,8);
    if(matches.length===0){sug.style.display="none";return}
    sug.innerHTML = matches.map(m=>`<div data-pick="${m}">${m.replace(new RegExp("("+v+")","ig"),'<span style="color:var(--gold)">$1</span>')}</div>`).join("");
    sug.style.display = "block";
  });
  sug.addEventListener("click",e=>{
    const t = e.target.closest("[data-pick]"); if(!t) return;
    nameInput.value = t.getAttribute("data-pick");
    sug.style.display = "none";
  });
  document.addEventListener("click",e=>{
    if(!e.target.closest("#rsvpName") && !e.target.closest("#rsvpSuggest")) sug.style.display="none";
  });

  document.getElementById("rsvpForm").addEventListener("submit",e=>{
    e.preventDefault();
    const name = nameInput.value.trim();
    if(!name) return;
    const guests = +document.getElementById("rsvpGuests").value;
    const events = Array.from(document.querySelectorAll("#eventChecks input:checked")).map(c=>c.value);
    const notes = document.getElementById("rsvpNotes").value.trim();
    saveRSVP(name,{attending:attend, guests:attend==="yes"?guests:0, events:attend==="yes"?events:[], notes});
    toast(attend==="yes" ? "Thank you! We can't wait to celebrate with you." : "Thank you for letting us know. You will be missed.");
    setTimeout(()=>navigate("home"),1800);
  });
}

function wireIndia(){
  document.querySelectorAll("[data-add]").forEach(b=>{
    b.addEventListener("click",()=>{
      const i = +b.getAttribute("data-add");
      const name = DESTINATIONS[i].name;
      const itin = getItin();
      if(itin.includes(name)){toast(name+" is already in your plan");return}
      itin.push(name); saveItin(itin);
      toast("Added "+name+" to your itinerary");
      render();
    });
  });
  const list = document.getElementById("itinList");
  if(list){
    list.addEventListener("click",e=>{
      const t = e.target.closest("[data-rm]"); if(!t) return;
      const i = +t.getAttribute("data-rm");
      const itin = getItin(); itin.splice(i,1); saveItin(itin); render();
    });
  }
  const clr = document.getElementById("clearItin");
  if(clr) clr.addEventListener("click",()=>{saveItin([]); render(); toast("Itinerary cleared");});
}

function wireFAQs(){
  document.querySelectorAll(".faq").forEach(f=>{
    f.addEventListener("click",()=>{
      const wasOpen = f.classList.contains("open");
      document.querySelectorAll(".faq").forEach(x=>x.classList.remove("open"));
      if(!wasOpen) f.classList.add("open");
    });
  });
}

document.getElementById("navToggle").addEventListener("click",()=>{
  document.getElementById("mobileMenu").classList.toggle("open");
});

render();
</script>
